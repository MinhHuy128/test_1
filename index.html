<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mminh IoT App</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/565/565547.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --blue: #007AFF; --green: #34C759; --red: #FF3B30; --bg: #F2F2F7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 16px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-val { font-size: 28px; font-weight: bold; color: var(--blue); margin: 8px 0; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-led { height: 60px; font-size: 20px; }
        #status { text-align: center; color: var(--green); font-weight: 500; font-size: 14px; }
    </style>
</head>
<body>
    <h2 style="text-align:center; margin-top:30px;">mminh Dashboard</h2>
    <p id="status">● Đang kết nối...</p>

    <div class="grid">
        <div class="card">
            <span style="color:gray; font-size:12px;">NHIỆT ĐỘ</span>
            <div class="stat-val"><span id="tV">--</span>°C</div>
            <input type="number" id="tI" value="25">
            <button class="btn-blue" onclick="pub('temp', 'tI')">Gửi</button>
        </div>
        <div class="card">
            <span style="color:gray; font-size:12px;">ĐỘ ẨM</span>
            <div class="stat-val"><span id="hV">--</span>%</div>
            <input type="number" id="hI" value="60">
            <button class="btn-blue" onclick="pub('humidity', 'hI')">Gửi</button>
        </div>
    </div>

    <div class="card">
        <button id="lB" class="btn-led" onclick="toggle()" style="background:var(--green); color:white;">BẬT ĐÈN</button>
    </div>

    <div class="card">
        <canvas id="chart"></canvas>
    </div>

<script>
    const USER = "minhhuybhh";
    const KEY = "aio_OugH46leRNuo5n8WbsaA90zfYBg9";
    const feeds = { temp: `${USER}/feeds/temp`, hum: `${USER}/feeds/humidity`, led: `${USER}/feeds/led` };

    const client = mqtt.connect(`wss://io.adafruit.com:443`, { username: USER, password: KEY });
    let ledOn = 0;

    const ctx = document.getElementById('chart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [
            { label: 'T', borderColor: '#FF3B30', data: [], tension: 0.4 },
            { label: 'H', borderColor: '#007AFF', data: [], tension: 0.4 }
        ]},
        options: { plugins: { legend: { display: false } } }
    });

    client.on('connect', () => {
        document.getElementById('status').innerText = "● Trực tuyến";
        client.subscribe(Object.values(feeds));
    });

    client.on('message', (t, m) => {
        const v = m.toString();
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        if (t === feeds.temp) { document.getElementById('tV').innerText = v; update(0, v, time); }
        else if (t === feeds.hum) { document.getElementById('hV').innerText = v; update(1, v, time); }
        else if (t === feeds.led) {
            ledOn = parseInt(v);
            const btn = document.getElementById('lB');
            btn.innerText = ledOn ? "TẮT ĐÈN" : "BẬT ĐÈN";
            btn.style.background = ledOn ? "#FF3B30" : "#34C759";
        }
    });

    function update(idx, v, time) {
        if (chart.data.labels.length > 10) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); chart.data.datasets[1].data.shift(); }
        chart.data.datasets[idx].data.push(v);
        if (!chart.data.labels.includes(time)) chart.data.labels.push(time);
        chart.update();
    }

    function pub(type, id) { client.publish(feeds[type], document.getElementById(id).value); }
    function toggle() { client.publish(feeds.led, ledOn ? "0" : "1"); }
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
